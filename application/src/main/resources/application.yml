app:
  auth:
    mode: keycloak
    keycloak:
      realm: ${KEYCLOAK_REALM:flowledger}
      auth-server-url: ${KEYCLOAK_URL:http://localhost:8080}
      client-id: ${KEYCLOAK_CLIENT_ID:flowledger-app}
      client-secret: ${KEYCLOAK_CLIENT_SECRET:}
      issuer-uri: ${KEYCLOAK_ISSUER_URI:${app.auth.keycloak.auth-server-url}/realms/${app.auth.keycloak.realm}}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.auth.keycloak.issuer-uri}
