databaseChangeLog:
  - changeSet:
      id: 008-add-user-name-fields
      author: codex
      preConditions:
        - onFail: MARK_RAN
          onError: MARK_RAN
          sqlCheck:
            expectedResult: "1"
            sql: "select 1"
      changes:
